<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель администратора</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { background: #4361ee; color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 10px; overflow: hidden; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f0f0f0; }
        .badge { padding: 3px 10px; border-radius: 10px; color: white; }
        .admin { background: #f8961e; }
        .user { background: #4cc9f0; }
        .btn { padding: 10px 20px; background: #4361ee; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>👑 Панель администратора Pet Shelter</h1>
            <p>Управление системой приюта для животных</p>
        </header>

        <p>Всего пользователей: {{.UserCount}} (Администраторов: {{.AdminCount}})</p>

        <h3>Список пользователей:</h3>
        <table>
            <tr>
                <th>ID</th>
                <th>Имя пользователя</th>
                <th>Роль</th>
            </tr>
            {{range .Users}}
            <tr>
                <td>{{.ID}}</td>
                <td>{{.Username}}</td>
                <td>
                    <span class="badge {{.Role}}">{{.Role}}</span>
                </td>
            </tr>
            {{end}}
        </table>

        <div style="margin-top: 30px;">
            <a href="/" class="btn">← На главную</a>
        </div>
    </div>
</body>
</html>
