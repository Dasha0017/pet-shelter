<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог товаров</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background: #f0f0f0; }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #4361ee; color: white; text-decoration: none; border-radius: 5px; }
        .btn-del { padding: 5px 10px; background: #f72585; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛒 Каталог товаров</h1>
        </header>

        <table>
            <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Цена</th>
                <th>Количество</th>
                <th>Действия</th>
            </tr>
            {{range .Items}}
            <tr>
                <td>{{.ID}}</td>
                <td>{{.Name}}</td>
                <td>{{printf "%.2f" .Price}} ₽</td>
                <td>{{.Quantity}}</td>
                <td>
                    <form action="/admin/catalog/delete" method="post" style="display:inline;">
                        <input type="hidden" name="id" value="{{.ID}}">
                        <button type="submit" class="btn-del">Удалить</button>
                    </form>
                </td>
            </tr>
            {{end}}
        </table>

        <a href="/" class="btn">← На главную</a>
    </div>
</body>
</html>
