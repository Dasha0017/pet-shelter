<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Животные в приюте</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { margin-bottom: 20px; }
        h1 { margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; background: #ffffff; border-radius: 10px; overflow: hidden; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background: #f0f0f0; }
        tr:nth-child(even) { background: #fafafa; }
        .btn-back {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #4361ee;
            color: #ffffff;
            text-decoration: none;
            border-radius: 5px;
        }
        .btn-back:hover { background: #3a0ca3; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐾 Животные в приюте</h1>
            <p>Список всех животных из системы</p>
        </header>

        <table>
            <tr>
                <th>ID</th>
                <th>Имя</th>
                <th>Вид</th>
                <th>Возраст</th>
            </tr>
            {{range .Animals}}
            <tr>
                <td>{{.ID}}</td>
                <td>{{.Name}}</td>
                <td>{{.Species}}</td>
                <td>{{.Age}} лет</td>
            </tr>
            {{end}}
        </table>

        <a href="/" class="btn-back">← На главную</a>
    </div>
</body>
</html>
